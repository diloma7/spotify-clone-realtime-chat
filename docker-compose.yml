version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: spotify_redis

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://spotify_redis:6379
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: spotify_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.local
    environment:
      # API is reached by the browser via the host; use nginx on localhost
      - VITE_API_URL=http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
