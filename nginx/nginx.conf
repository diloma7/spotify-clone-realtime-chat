events {}

http {
  # WebSocket upgrade handling (Socket.IO)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Basic logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # Gzip compression for text-based responses
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml;

  # General security / robustness
  client_max_body_size 50m;         # match your upload limit
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Upstream cluster for the backend service
  upstream backend_upstream {
    # Sticky routing is required for Socket.IO when running multiple backend instances
    # (otherwise polling/WebSocket upgrade requests can land on different instances).
    ip_hash;
    # docker-compose DNS name for the backend service
    server backend:5006;
  }

  server {
    listen 80;
    server_name _;

    # Socket.IO (Engine.IO) endpoint - supports polling + websockets
    location /socket.io/ {
      proxy_pass http://backend_upstream;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 300s;
      proxy_send_timeout 300s;

      # Avoid buffering long-polling responses
      proxy_buffering off;
    }

    # Health check endpoint (proxied to backend /health)
    location /health {
      proxy_pass http://backend_upstream/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main API / app proxy
    location / {
      proxy_pass http://backend_upstream;

      # Preserve original host and client IP info
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support (for socket.io)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Timeouts suitable for long-lived connections
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # Basic security headers (you can tune further later)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
  }
}
